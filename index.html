<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Nhỏ Cá Nhân</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Khối thông tin cá nhân chính -->
    <div class="profile-container">
        <!-- Ảnh đại diện: Bạn có thể thay bằng link ảnh của bạn hoặc để ảnh tạm từ mạng -->
        <img src="https://picsum.photos/150" alt="Ảnh đại diện" class="avatar">
        
        <h1>Xin chào, tôi là Phát 👋</h1>
        <p class="bio">Chào mừng bạn đến với góc nhỏ của tôi. Nơi tôi chia sẻ về công việc, sở thích và những thứ hay ho trong cuộc sống.</p>
        
        <hr> <!-- Đường kẻ ngang phân cách -->

        <!-- Các nút liên kết quan trọng -->
        <div class="links-group">
            <h2>Kết nối với tôi:</h2>
            <a href="mailto:your-email@gmail.com" class="web-btn mail-btn">📧 Gửi Email cho tôi</a>
            <a href="https://facebook.com" target="_blank" class="web-btn fb-btn">📘 Facebook</a>
            <a href="#" class="web-btn blog-btn">✍️ Đọc Blog của tôi</a>
        </div>
    </div>

</body>
</html>
